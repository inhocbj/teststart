<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">🌓</button>
        <h1>Lottery Generator</h1>
        <div class="numbers">
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
            <span class="number">?</span>
        </div>
        <button id="generate">Generate Numbers</button>

        <hr class="separator">

        <div class="contact-section">
            <h2>Partnership / Affiliate</h2>
            <form action="https://formspree.io/f/maqpeyje" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Proposal or Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
